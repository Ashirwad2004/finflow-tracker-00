<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinFlow — Billing, Inventory & Online Store</title>
  <meta name="description"
    content="FinFlow is modern billing software: invoices, GST reports, inventory, parties, and a live customer storefront in one SaaS workspace." />
  <meta name="author" content="FinFlow" />

  <meta property="og:title" content="FinFlow — Billing, Inventory & Online Store" />
  <meta property="og:description"
    content="Run your business billing, stock, and online orders from one place with FinFlow." />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary_large_image" />

  <!-- Modern FinFlow web icon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#7c3aed" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("/sw.js")
          .then((reg) => console.log("[PWA] Service Worker registered:", reg.scope))
          .catch((err) => console.error("[PWA] Service Worker registration failed:", err));
      });
    }
  </script>
</body>


</html>
