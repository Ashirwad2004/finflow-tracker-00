name: Continuous Integration

on:
  push:
    branches:
      - main
      - fixed-paymnet-issue
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  frontend-checks:
    name: Frontend Quality & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 make g++

      - name: Install Root Dependencies
        run: npm ci --verbose

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci --verbose

      - name: Run ESLint Checks
        run: npm run lint

      - name: Run TypeScript Type Checks
        working-directory: frontend
        run: npx tsc --noEmit --project tsconfig.json

      - name: Build Production Frontend Bundle
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: "https://dummy-project.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: "dummy-key"
        run: npm run build

  backend-checks:
    name: Backend Syntax & Imports Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python Syntax & Compilation
        working-directory: backend
        run: python -m py_compile main.py $(find src -name "*.py")

  docker-build-checks:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create mock environment file
        run: |
          echo "VITE_SUPABASE_URL=https://dummy-project.supabase.co" > .env
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=dummy-key" >> .env
          echo "SUPABASE_SERVICE_ROLE_KEY=dummy-role-key" >> .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Compose Configuration
        run: docker compose config

      - name: Build Services (Dry run build validation)
        run: docker compose build
